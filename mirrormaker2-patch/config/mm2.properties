# ── MirrorMaker 2 Configuration ───────────────────────────────────────────────
# Replicates: primary cluster → standby cluster
# Source topic  : commit-log
# Target topic  : primary.commit-log
# ─────────────────────────────────────────────────────────────────────────────

# Cluster aliases
clusters = primary, standby

# Primary cluster (source)
primary.bootstrap.servers = primary-kafka:9092

# Standby cluster (destination)
standby.bootstrap.servers = standby-kafka:9093

# ── Replication Rules ─────────────────────────────────────────────────────────
# Only replicate the commit-log topic
primary->standby.enabled = true
primary->standby.topics  = commit-log

# Do NOT replicate internal topics
primary->standby.topics.exclude = .*[\-\.]internal, .*\.replica, __.*

# ── Consumer Settings (Source Side) ───────────────────────────────────────────
primary->standby.consumer.group.id           = mm2-replication-group
primary->standby.consumer.auto.offset.reset  = earliest
primary->standby.consumer.max.poll.records   = 500
primary->standby.consumer.poll.timeout.ms    = 1000

# ── Producer Settings (Destination Side) ──────────────────────────────────────
primary->standby.producer.acks               = all
primary->standby.producer.retries            = 3
primary->standby.producer.batch.size         = 16384
primary->standby.producer.linger.ms          = 5

# ── Topic Config Sync ──────────────────────────────────────────────────────────
# Keep partition count and replication factor from source
primary->standby.sync.topic.configs.enabled  = true
primary->standby.sync.topic.acls.enabled     = false

# ── Heartbeat & Checkpoint ─────────────────────────────────────────────────────
primary->standby.emit.heartbeats.enabled      = true
primary->standby.emit.checkpoints.enabled     = true
primary->standby.heartbeats.interval.seconds  = 5
primary->standby.checkpoints.interval.seconds = 10

# ── Offset Sync ───────────────────────────────────────────────────────────────
primary->standby.offset-syncs.topic.replication.factor = 1

# ── Replication Factor ────────────────────────────────────────────────────────
replication.factor = 1

# ── Internal Topics ────────────────────────────────────────────────────────────
heartbeats.topic.replication.factor    = 1
checkpoints.topic.replication.factor   = 1
offset.storage.replication.factor      = 1
status.storage.replication.factor      = 1
config.storage.replication.factor      = 1

# ── Connect Worker Settings ───────────────────────────────────────────────────
offset.flush.interval.ms = 10000
